<!DOCTYPE html>
<html>
<head>
  <title>Lyrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: black;
      --text: white;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-size: 32px;
      line-height: 1.7;
      padding: 20px;
      font-family: Arial, sans-serif;
      transition: 0.3s;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    button {
      font-size: 20px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    select {
      font-size: 20px;
      padding: 10px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <select onchange="loadSong(this.value)">
    <option value="yaman">भजगोविन्दं </option>
    <option value="pilu">KrishnaShtakam</option>
    <option value="shiv">Shivranjani</option>
  </select>

  <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<h2 id="title"></h2>
<p id="lyrics"></p>

<script>
  const songs = {
    yaman: {
      title: "भजगोविन्दं ",
      lyrics: `
      भजगोविन्दं भजगोविन्दं
गोविन्दं भजमूढमते .
संप्राप्ते सन्निहिते काले
नहि नहि रक्षति डुकृञ्करणे .. १..(1)

मूढ जहीहि धनागमतृष्णां
कुरु सद्बुद्धिं मनसि वितृष्णाम् .
यल्लभसे निजकर्मोपात्तं
वित्तं तेन विनोदय चित्तम् .. २..(2)

यावद्वित्तोपार्जन सक्तः
स्तावन्निज परिवारो रक्तः .
पश्चाज्जीवति जर्जर देहे
वार्तां कोऽपि न पृच्छति गेहे .. 3..

मा कुरु धन जन यौवन गर्वं
हरति निमेषात्कालः सर्वम् .
मायामयमिदमखिलं हित्वा
ब्रह्मपदं त्वं प्रविश विदित्वा .. 4..

सुर मंदिर तरु मूल निवासः
शय्या भूतल मजिनं वासः .
सर्व परिग्रह भोग त्यागः
कस्य सुखं न करोति विरागः .. 5..

भगवद् गीता किञ्चिदधीता
गङ्गा जललव कणिकापीता .
सकृदपि येन मुरारि समर्चा
क्रियते तस्य यमेन न चर्चा .. 6..

पुनरपि जननं पुनरपि मरणं
पुनरपि जननी जठरे शयनम् .
इह संसारे बहुदुस्तारे
कृपयाऽपारे पाहि मुरारे .. 7..

गेयं गीता नाम सहस्रं
ध्येयं श्रीपति रूपमजस्रम् .
नेयं सज्जन सङ्गे चित्तं
देयं दीनजनाय च वित्तम् .. 8..

अर्थमनर्थं भावय नित्यं
नास्तिततः सुखलेशः सत्यम् .
पुत्रादपि धन भाजां भीतिः
सर्वत्रैषा विहिआ रीतिः .. 9..

गुरुचरणाम्बुज निर्भर भकतः
सारादचिराद्भव मुक्तः .
सेन्द्रियमानस नियमादेवं
द्रक्ष्यसि निज हृदयस्थं देवम् .. 10..
      `
    },
    pilu: {
      title: "Raag Pilu",
      lyrics: `Line 1
Line 2

Line 3`
    },
    shiv: {
      title: "KrishnaShtakam",
      lyrics: `
     भजे व्रजैकमण्डनं समस्तपापखण्डनं
स्वभक्तचित्तरंजनं सदैव नन्दनन्दनम् |
सुपिच्छगुच्छमस्तकं सुनादवेणुहस्तकं
अनंगरंगसागरं नमामि कृष्णनागरम् || १ ||

मनोजगर्वमोचनं विशाललोललोचनं
विधूतगोपशोचनं नमामि पद्मलोचनम् |
करारविन्दभूधरं स्मितावलोकसुन्दरं
महेन्द्रमानदारणं नमामि कृष्णावारणम् || २ ||

कदम्बसूनकुण्डलं सुचारुगण्डमण्डलं
व्रजांगनैकवल्लभं नमामि कृष्णदुर्लभम् |
यशोदया समोदया सगोपया सनन्दया
युतं सुखैकदायकं नमामि गोपनायकम् || ३ ||

सदैव पादपंकजं मदीय मानसे निजं
दधानमुक्तमालकं नमामि नन्दबालकम् |
समस्तदोषशोषणं समस्तलोकपोषणं
समस्तगोपमानसं नमामि नन्दलालसम् || ४ ||

भुवो भरावतारकं भवाब्धिकर्णधारकं
यशोमतीकिशोरकं नमामि चित्तचोरकम् |
दृगन्तकान्तभंगिनं सदा सदालिसंगिनं
दिने दिने नवं नवं नमामि नन्दसम्भवम् || ५ ||

गुणाकरं सुखाकरं कृपाकरं कृपापरं
सुरद्विषन्निकन्दनं नमामि गोपनन्दनम् |
नवीनगोपनागरं नवीनकेलिलम्पटं
नमामि मेघसुन्दरं तडित्प्रभालसत्पटम् || ६ ||

समस्तगोपनन्दनं हृदम्बुजैकमोदनं
नमामि कुंजमध्यगं प्रसन्नभानुशोभनम् |
निकामकामदायकं दृगन्तचारुसायकं
रसालवेणुगायकं नमामि कुंजनायकम् || ७ ||

विदग्धगोपिकामनोमनोज्ञतल्पशायिनं
नमामि कुंजकानने प्रव्रद्धवन्हिपायिनम् |
किशोरकान्तिरंजितं दृअगंजनं सुशोभितं
गजेन्द्रमोक्षकारिणं नमामि श्रीविहारिणम् || ८ ||

यदा तदा यथा तथा तथैव कृष्णसत्कथा
मया सदैव गीयतां तथा कृपा विधीयताम् |
प्रमाणिकाष्टकद्वयं जपत्यधीत्य यः पुमान
भवेत्स नन्दनन्दने भवे भवे सुभक्तिमान || ९ ||

इति श्रीमद शंकराचार्यकृतं श्रीकृष्णाष्टकं सम्पूर्णम् 
      `
    }
  };

  function loadSong(key) {
    document.getElementById("title").innerText = songs[key].title;
    document.getElementById("lyrics").innerText = songs[key].lyrics;
  }

  function toggleTheme() {
    const root = document.documentElement;
    if (root.style.getPropertyValue('--bg') === 'white') {
      root.style.setProperty('--bg', 'black');
      root.style.setProperty('--text', 'white');
    } else {
      root.style.setProperty('--bg', 'white');
      root.style.setProperty('--text', 'black');
    }
  }

  // load default
  loadSong("yaman");
</script>

</body>
</html>
