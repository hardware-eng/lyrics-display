<!DOCTYPE html>
<html>
<head>
  <title>Lyrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: black;
      --text: white;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-size: 32px;
      line-height: 1.7;
      padding: 20px;
      font-family: Arial, sans-serif;
      transition: 0.3s;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    button {
      font-size: 20px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    select {
      font-size: 20px;
      padding: 10px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <select onchange="loadSong(this.value)">
    <option value="yaman">Raag Yaman</option>
    <option value="pilu">Raag Pilu</option>
    <option value="shiv">Shivranjani</option>
  </select>

  <button onclick="toggleTheme()">Toggle Theme</button>
</div>

<h2 id="title"></h2>
<p id="lyrics"></p>

<script>
  const songs = {
    yaman: {
      title: "Raag Yaman",
      lyrics: `Sa re ga ma pa...
Ma pa dha ni sa...

(Your lyrics here)`
    },
    pilu: {
      title: "Raag Pilu",
      lyrics: `Line 1
Line 2

Line 3`
    },
    shiv: {
      title: "Shivranjani",
      lyrics: `Line A
Line B

Line C`
    }
  };

  function loadSong(key) {
    document.getElementById("title").innerText = songs[key].title;
    document.getElementById("lyrics").innerText = songs[key].lyrics;
  }

  function toggleTheme() {
    const root = document.documentElement;
    if (root.style.getPropertyValue('--bg') === 'white') {
      root.style.setProperty('--bg', 'black');
      root.style.setProperty('--text', 'white');
    } else {
      root.style.setProperty('--bg', 'white');
      root.style.setProperty('--text', 'black');
    }
  }

  // load default
  loadSong("yaman");
</script>

</body>
</html>
