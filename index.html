<!DOCTYPE html>
<html lang="sa">
<head>
  <meta charset="UTF-8">
  <title>Lyrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --item-bg: #1a1a1a;
      --item-hover: #2a2a2a;
      --bar-bg: #111;
      --muted: #888;
    }
    body.light {
      --bg: #f5f5f5;
      --text: #000;
      --item-bg: #fff;
      --item-hover: #e8e8e8;
      --bar-bg: #ddd;
      --muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 28px;
      line-height: 1.8;
      transition: background 0.2s, color 0.2s;
    }

    /* ── top bar ── */
    .bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bar-bg);
      padding: 10px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bar-title {
      flex: 1;
      font-size: 26px;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar button {
      font-size: 26px;
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--text);
    }

    /* ── list items ── */
    .list {
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
    }
    .list-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 18px 20px;
      font-size: 28px;
      background: var(--item-bg);
      color: var(--text);
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .list-item:active { background: var(--item-hover); }

    /* ── content view ── */
    #content-text {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 16px;
      font-size: 28px;
      line-height: 1.9;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<!-- View: folder list -->
<div id="v-folders">
  <div class="bar">
    <span class="bar-title">Lyrics</span>
    <button onclick="toggleTheme()">☀/☾</button>
  </div>
  <div id="folder-list" class="list"></div>
</div>

<!-- View: file list -->
<div id="v-files" class="hidden">
  <div class="bar">
    <button onclick="show('folders')">←</button>
    <span id="lbl-folder" class="bar-title"></span>
    <button onclick="toggleTheme()">☀/☾</button>
  </div>
  <div id="file-list" class="list"></div>
</div>

<!-- View: content -->
<div id="v-content" class="hidden">
  <div class="bar">
    <button onclick="show('files')">←</button>
    <span id="lbl-file" class="bar-title"></span>
    <button onclick="toggleTheme()">☀/☾</button>
  </div>
  <div id="content-text">Loading…</div>
</div>

<script>
  let manifest = null;
  let currentFolder = null;

  async function init() {
    try {
      const res = await fetch('manifest.json');
      manifest = await res.json();
    } catch(e) {
      document.getElementById('folder-list').textContent = 'Could not load manifest.';
      return;
    }
    const list = document.getElementById('folder-list');
    manifest.folders.forEach(folder => {
      const btn = document.createElement('button');
      btn.className = 'list-item';
      btn.textContent = folder.label;
      btn.onclick = () => openFolder(folder);
      list.appendChild(btn);
    });
  }

  function openFolder(folder) {
    currentFolder = folder;
    document.getElementById('lbl-folder').textContent = folder.label;
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    folder.files.forEach(file => {
      const btn = document.createElement('button');
      btn.className = 'list-item';
      btn.textContent = file.label;
      btn.onclick = () => openFile(file);
      list.appendChild(btn);
    });
    show('files');
  }

  async function openFile(file) {
    document.getElementById('lbl-file').textContent = file.label;
    document.getElementById('content-text').textContent = 'Loading…';
    show('content');
    try {
      const res = await fetch(file.path);
      if (!res.ok) throw new Error(res.status);
      document.getElementById('content-text').textContent = await res.text();
    } catch(e) {
      document.getElementById('content-text').textContent = 'Could not load file.';
    }
  }

  function show(view) {
    ['folders', 'files', 'content'].forEach(v => {
      document.getElementById('v-' + v).classList.toggle('hidden', v !== view);
    });
    window.scrollTo(0, 0);
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
  }

  init();
</script>

</body>
</html>
