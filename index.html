<!DOCTYPE html>
<html lang="sa">
<head>
  <meta charset="UTF-8">
  <title>Lyrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --muted: #888;
      --btn-bg: #222;
      --btn-text: #fff;
      --select-bg: #222;
    }
    body.light {
      --bg: #fff;
      --text: #000;
      --muted: #555;
      --btn-bg: #ddd;
      --btn-text: #000;
      --select-bg: #eee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 30px;
      line-height: 1.8;
      padding: 16px;
      transition: background 0.2s, color 0.2s;
    }
    .top-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    select {
      flex: 1;
      font-size: 22px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: var(--select-bg);
      color: var(--text);
      min-width: 0;
    }
    button {
      font-size: 22px;
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: var(--btn-bg);
      color: var(--btn-text);
      white-space: nowrap;
    }
    #content {
      white-space: pre-wrap;
      word-break: break-word;
      padding-top: 8px;
    }
    #status {
      color: var(--muted);
      font-size: 20px;
      padding: 20px 0;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <select id="picker" onchange="loadFile(this.value)">
    <option value="">— select —</option>
  </select>
  <button onclick="toggleTheme()">☀ / ☾</button>
</div>

<div id="status"></div>
<div id="content"></div>

<script>
  const MANIFEST = [
    { label: "BG Adhyay 01", path: "lyrics/bhagvad_gita/adhyay_01.txt" },
    { label: "BG Adhyay 03", path: "lyrics/bhagvad_gita/adhyay_03.txt" },
    { label: "BG Adhyay 10", path: "lyrics/bhagvad_gita/adhyay_10.txt" },
    { label: "BG Adhyay 15", path: "lyrics/bhagvad_gita/adhyay_15.txt" },
    { label: "BG Adhyay 16", path: "lyrics/bhagvad_gita/adhyay_16.txt" },
    { label: "BG Adhyay 17", path: "lyrics/bhagvad_gita/adhyay_17.txt" },
  ];

  const picker  = document.getElementById("picker");
  const content = document.getElementById("content");
  const status  = document.getElementById("status");

  MANIFEST.forEach(({ label, path }) => {
    const opt = document.createElement("option");
    opt.value = path;
    opt.textContent = label;
    picker.appendChild(opt);
  });

  async function loadFile(path) {
    if (!path) { content.textContent = ""; return; }
    status.textContent = "Loading…";
    content.textContent = "";
    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(res.status);
      content.textContent = await res.text();
      status.textContent = "";
    } catch (e) {
      status.textContent = "Could not load file.";
    }
  }

  function toggleTheme() {
    document.body.classList.toggle("light");
  }
</script>

</body>
</html>
