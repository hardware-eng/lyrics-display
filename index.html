<!DOCTYPE html>
<html lang="sa">
<head>
  <meta charset="UTF-8">
  <title>Lyrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --item-bg: #1a1a1a;
      --item-hover: #2a2a2a;
      --bar-bg: #111;
      --player-bg: #1a1a1a;
      --progress-bg: #333;
      --progress-fill: #4a9eff;
    }
    body.light {
      --bg: #f5f5f5;
      --text: #000;
      --item-bg: #fff;
      --item-hover: #e8e8e8;
      --bar-bg: #ddd;
      --player-bg: #e0e0e0;
      --progress-bg: #bbb;
      --progress-fill: #1a6ed8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      font-size: 28px;
      line-height: 1.8;
      transition: background 0.2s, color 0.2s;
    }
    .bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bar-bg);
      padding: 10px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .bar-title {
      flex: 1;
      font-size: 26px;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar button {
      font-size: 26px;
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--text);
    }
    .list {
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
    }
    .list-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 18px 20px;
      font-size: 28px;
      background: var(--item-bg);
      color: var(--text);
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .list-item:active { background: var(--item-hover); }
    #content-text {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 16px;
      font-size: 28px;
      line-height: 1.9;
    }
    /* ── Audio player ── */
    #audio-player {
      background: var(--player-bg);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 56px;
      z-index: 9;
    }
    #audio-player.no-audio {
      opacity: 0.45;
    }
    #btn-play {
      font-size: 34px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--progress-fill);
      color: #fff;
      flex-shrink: 0;
    }
    #audio-player.no-audio #btn-play {
      cursor: default;
      background: var(--progress-bg);
    }
    #progress-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #progress-bar {
      height: 14px;
      background: var(--progress-bg);
      border-radius: 7px;
      cursor: pointer;
      position: relative;
    }
    #audio-player.no-audio #progress-bar { cursor: default; }
    #progress-fill {
      height: 100%;
      background: var(--progress-fill);
      border-radius: 7px;
      width: 0%;
    }
    #time-display {
      font-size: 22px;
      color: var(--text);
      opacity: 0.7;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<!-- Level 1: top-level folders -->
<div id="v-folders">
  <div class="bar">
    <span class="bar-title">Lyrics</span>
    <button onclick="toggleTheme()">☀/☾</button>
  </div>
  <div id="folder-list" class="list"></div>
</div>

<!-- Level 2: person/subfolder list (for nested folders like great_people) -->
<div id="v-subfolders" class="hidden">
  <div class="bar">
    <button onclick="show('folders')">←</button>
    <span id="lbl-parent" class="bar-title"></span>
    <button onclick="toggleTheme()">☀/☾</button>
  </div>
  <div id="subfolder-list" class="list"></div>
</div>

<!-- Level 2 or 3: file list -->
<div id="v-files" class="hidden">
  <div class="bar">
    <button id="files-back-btn" onclick="filesBack()">←</button>
    <span id="lbl-folder" class="bar-title"></span>
    <button onclick="toggleTheme()">☀/☾</button>
  </div>
  <div id="file-list" class="list"></div>
</div>

<!-- Content -->
<div id="v-content" class="hidden">
  <div class="bar">
    <button onclick="show('files')">←</button>
    <span id="lbl-file" class="bar-title"></span>
    <button onclick="toggleTheme()">☀/☾</button>
  </div>
  <!-- Audio player (hidden when no mp3 for this file) -->
  <div id="audio-player" class="hidden">
    <audio id="audio-el" preload="none"></audio>
    <button id="btn-play" onclick="togglePlay()">▶</button>
    <div id="progress-wrap">
      <div id="progress-bar" onclick="seekAudio(event)">
        <div id="progress-fill"></div>
      </div>
      <span id="time-display">0:00</span>
    </div>
  </div>
  <div id="content-text">Loading…</div>
</div>

<script>
  let manifest = null;
  let filesBackTarget = 'folders';

  async function init() {
    try {
      const res = await fetch('manifest.json');
      manifest = await res.json();
    } catch(e) {
      document.getElementById('folder-list').textContent = 'Could not load manifest.';
      return;
    }
    const list = document.getElementById('folder-list');
    manifest.folders.forEach(folder => {
      const btn = document.createElement('button');
      btn.className = 'list-item';
      btn.textContent = folder.label;
      btn.onclick = () => openFolder(folder);
      list.appendChild(btn);
    });
  }

  function openFolder(folder) {
    if (folder.files) {
      filesBackTarget = 'folders';
      showFileList(folder.label, folder.files);
    } else if (folder.folders) {
      document.getElementById('lbl-parent').textContent = folder.label;
      const list = document.getElementById('subfolder-list');
      list.innerHTML = '';
      folder.folders.forEach(sub => {
        const btn = document.createElement('button');
        btn.className = 'list-item';
        btn.textContent = sub.label;
        btn.onclick = () => {
          filesBackTarget = 'subfolders';
          showFileList(sub.label, sub.files);
        };
        list.appendChild(btn);
      });
      show('subfolders');
    }
  }

  function showFileList(label, files) {
    document.getElementById('lbl-folder').textContent = label;
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    files.forEach(file => {
      const btn = document.createElement('button');
      btn.className = 'list-item';
      btn.textContent = file.label + (file.mp3 ? '  ▶' : '');
      btn.onclick = () => openFile(file);
      list.appendChild(btn);
    });
    show('files');
  }

  async function openFile(file) {
    document.getElementById('lbl-file').textContent = file.label;
    document.getElementById('content-text').textContent = 'Loading…';
    show('content');

    const audio   = document.getElementById('audio-el');
    const player  = document.getElementById('audio-player');
    const btnPlay = document.getElementById('btn-play');

    if (file.mp3) {
      audio.pause();
      audio.src = file.mp3;
      audio.load();
      btnPlay.textContent = '▶';
      btnPlay.onclick = togglePlay;
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('time-display').textContent = '0:00';
      player.classList.remove('hidden');
      player.classList.remove('no-audio');
    } else {
      audio.pause();
      audio.src = '';
      btnPlay.textContent = '✕';
      btnPlay.onclick = null;
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('time-display').textContent = 'Audio not available';
      player.classList.remove('hidden');
      player.classList.add('no-audio');
    }

    try {
      const res = await fetch(file.path);
      if (!res.ok) throw new Error(res.status);
      document.getElementById('content-text').textContent = await res.text();
    } catch(e) {
      document.getElementById('content-text').textContent = 'Could not load file.';
    }
  }

  function togglePlay() {
    const audio   = document.getElementById('audio-el');
    const btnPlay = document.getElementById('btn-play');
    if (audio.paused) {
      audio.play();
      btnPlay.textContent = '⏸';
    } else {
      audio.pause();
      btnPlay.textContent = '▶';
    }
  }

  function seekAudio(e) {
    const audio = document.getElementById('audio-el');
    if (!audio.duration) return;
    const ratio = e.offsetX / e.currentTarget.offsetWidth;
    audio.currentTime = ratio * audio.duration;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  const audioEl = document.getElementById('audio-el');
  audioEl.addEventListener('timeupdate', () => {
    if (!audioEl.duration) return;
    const pct = (audioEl.currentTime / audioEl.duration * 100).toFixed(1);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent = formatTime(audioEl.currentTime);
  });
  audioEl.addEventListener('ended', () => {
    document.getElementById('btn-play').textContent = '▶';
  });

  function filesBack() { show(filesBackTarget); }

  function show(view) {
    if (view !== 'content') {
      const audio = document.getElementById('audio-el');
      audio.pause();
      document.getElementById('btn-play').textContent = '▶';
    }
    ['folders', 'subfolders', 'files', 'content'].forEach(v => {
      document.getElementById('v-' + v).classList.toggle('hidden', v !== view);
    });
    window.scrollTo(0, 0);
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
  }

  init();
</script>

</body>
</html>
